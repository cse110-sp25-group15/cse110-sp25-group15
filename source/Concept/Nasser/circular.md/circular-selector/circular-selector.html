<div class="circular-selector" role="radiogroup" aria-label="Delivery method">
  <div class="selector-label">Delivery method</div>

  <label class="circular-option">
    <span class="label-text">All</span>
    <input type="radio" name="delivery" value="all" checked />
  </label>

  <label class="circular-option">
    <span class="label-text">Local pickup</span>
    <input type="radio" name="delivery" value="local" />
  </label>

  <label class="circular-option">
    <span class="label-text">Shipping</span>
    <input type="radio" name="delivery" value="shipping" />
  </label>
</div>
